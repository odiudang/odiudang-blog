{{ define "main" }}

<header class="page-header">
    <h1>{{ .Title }}</h1>

    {{ with .Description }}
    <div class="post-description">
        {{ . }}
    </div>
    {{ end }}
</header>

<div class="post-grid">

{{ range .Pages }}

<article class="post-card">

    <a class="post-image" href="{{ .RelPermalink }}">
        {{ with .Params.cover.image }}
        <img src="{{ . | relURL }}" alt="{{ $.Title }}">
        {{ end }}
    </a>

    <div class="list-post-content">

        <div class="post-meta">
            📅 {{ .Date.Format "2 tháng 1, 2006" }}
            <span>•</span>
            ⏱️ {{ .ReadingTime }} phút đọc
        </div>

        <h2>
            <a href="{{ .RelPermalink }}">
                {{ .Title }}
            </a>
        </h2>

        <p class="post-summary">
            {{ .Description | default .Summary }}
        </p>

        <a class="read-more" href="{{ .RelPermalink }}">
            Đọc tiếp →
        </a>

    </div>

</article>

{{ end }}

</div>

{{ end }}
