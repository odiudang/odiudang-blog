baseURL = "https://odiudang.com/"
defaultContentLanguage = "vi"
theme = "PaperMod"
title = "Ổ Dịu Dàng"
locale = "vi-VN"
timeZone = "Asia/Ho_Chi_Minh"

enableRobotsTXT = true
enableGitInfo = true

[pagination]
pagerSize = 10

[params]
defaultTheme = "auto"

description = "Blog chia sẻ về học tập, ngoại ngữ, kế toán, Excel, Power BI và những trải nghiệm sống chậm mỗi ngày."
keywords = ["học tiếng Anh", "TOEIC", "Excel", "Power BI", "kế toán", "blog", "Ổ Dịu Dàng"]
author = "Ổ Dịu Dàng"
images = ["/images/og-cover.png"]

mainSections = ["posts"]

ShowReadingTime = true
ShowWordCount = true
ShowLastMod = true

ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowToc = true
ShowCodeCopyButtons = true

ShowFullTextinRSS = true


[params.homeInfoParams]
[params.assets]
theme_color = "#7A8F52"
msapplication_TileColor = "#7A8F52"
Title = "🌿 Ổ Dịu Dàng"

Content = """
Một góc nhỏ để lưu lại những điều đã học,
những kinh nghiệm đã trải qua
và những bài học vẫn đang tiếp tục khám phá.

Hy vọng nơi này sẽ đồng hành cùng bạn
trên hành trình học tập, phát triển
và sống chậm hơn mỗi ngày.
"""

